services:
  modbus:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/checkmysolar/modbus-bridge:latest
    restart: unless-stopped
    environment:
      CMS_BRIDGE_TOKEN: ${CMS_BRIDGE_TOKEN:?CMS_BRIDGE_TOKEN is required}
      MODBUS_HOST: ${MODBUS_HOST:?MODBUS_HOST is required}
      MODBUS_PORT: ${MODBUS_PORT:-502}
      MODBUS_UNIT_ID: ${MODBUS_UNIT_ID:-247}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-10000}
      MODBUS_TIMEOUT_MS: ${MODBUS_TIMEOUT_MS:-5000}
      # Optional: force register profile (h1g2, h1Series, kh, h3Legacy, h3Modern)
      INVERTER_PROFILE: ${INVERTER_PROFILE:-}
      # Optional: aux (RS485 adapter, default) or lan (direct inverter LAN)
      MODBUS_CONNECTION: ${MODBUS_CONNECTION:-aux}
      BRIDGE_HOSTNAME: ${BRIDGE_HOSTNAME:?BRIDGE_HOSTNAME is required}
      SITE_TIMEZONE: ${SITE_TIMEZONE:?SITE_TIMEZONE is required}
      CMS_API_URL: ${CMS_API_URL:-https://checkmy.solar}
      NOTIFY_DEBOUNCE_POLLS: ${NOTIFY_DEBOUNCE_POLLS:-2}
      BRIDGE_VERBOSE_LOG: ${BRIDGE_VERBOSE_LOG:-false}
    networks:
      cms_net:
        aliases:
          - ${BRIDGE_HOSTNAME}
    volumes:
      - bridge_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/v1/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --metrics 127.0.0.1:60123 --no-autoupdate run --token ${TUNNEL_TOKEN:?TUNNEL_TOKEN is required}
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "--metrics", "127.0.0.1:60123", "ready"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - cms_net

  debug:
    image: nicolaka/netshoot:latest
    profiles:
      - debug
    stdin_open: true
    tty: true
    environment:
      MODBUS_HOST: ${MODBUS_HOST:?MODBUS_HOST is required}
      MODBUS_PORT: ${MODBUS_PORT:-502}
      MODBUS_UNIT_ID: ${MODBUS_UNIT_ID:-247}
      CMS_BRIDGE_TOKEN: ${CMS_BRIDGE_TOKEN:-}
      BRIDGE_HOSTNAME: ${BRIDGE_HOSTNAME:?BRIDGE_HOSTNAME is required}
    networks:
      - cms_net
    command: sleep infinity

networks:
  cms_net:
    driver: bridge

volumes:
  bridge_data:
